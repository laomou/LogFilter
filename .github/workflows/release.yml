name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            bin: logfilter
            name: logfilter-linux-x64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-24.04
            bin: logfilter.exe
            name: logfilter-windows-x64.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: logfilter
            name: logfilter-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            bin: logfilter
            name: logfilter-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compile deps (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.name }}
